<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grade Sight — Home page exploration</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#f5f3ee"/>
    <g transform="translate(60,60)">
      <circle cx="40" cy="40" r="34" fill="none" stroke="#2a2622" stroke-width="3"/>
      <circle cx="40" cy="40" r="14" fill="#2a2622"/>
    </g>
    <text x="100" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2a2622">Grade Sight</text>
  </svg>
</template>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared-styles.jsx"></script>
<script type="text/babel" src="assessment-mock.jsx"></script>
<script type="text/babel" src="design-system-card.jsx"></script>
<script type="text/babel" src="dir-editorial.jsx"></script>
<script type="text/babel" src="dir-instrument.jsx"></script>
<script type="text/babel" src="dir-letter.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="intro" title="Grade Sight — Home page, three directions" subtitle="Same type + palette. Different voice and layout. Drag to reorder, click a card to rename, click the expand icon to focus.">
        <DCArtboard id="system" label="Design system · foundation" width={560} height={1400}>
          <DesignSystemCard />
        </DCArtboard>
      </DCSection>

      <DCSection id="directions" title="Three home page directions" subtitle="Each is a scrollable marketing home page. Click any artboard's expand icon to review full-bleed.">
        <DCArtboard id="editorial" label="01 · The Editorial — text-forward, considered essay" width={1200} height={3000}>
          <DirEditorial />
        </DCArtboard>
        <DCArtboard id="instrument" label="02 · The Instrument — product-forward, Linear/Stripe" width={1200} height={3200}>
          <DirInstrument />
        </DCArtboard>
        <DCArtboard id="letter" label="03 · The Letter — first-person, intimate voice" width={1200} height={2600}>
          <DirLetter />
        </DCArtboard>
      </DCSection>

      <DCSection id="notes" title="How to read this" subtitle="Reactions welcome — directionally which one, or which parts from each.">
        <DCPostIt x={40} y={20} width={300}>
          These are NOT finished marketing sites — they're direction probes. Evaluate voice, rhythm, hero choice, and which one feels like the product you described. The visual primitives (assessment, intervention card, longitudinal chart) are shared and carry over.
        </DCPostIt>
        <DCPostIt x={360} y={20} width={300}>
          The diagnostic moment — mocked student work with a sticky callout — appears in all three heroes. That's deliberate: it's the product's hero image, and I want you reacting to different framings of the same evidence.
        </DCPostIt>
        <DCPostIt x={680} y={20} width={300}>
          Next session, once you pick a direction (or a blend): diagnostic-reveal screen, longitudinal view, intervention card (print-ready), and the privacy/data-controls page.
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
