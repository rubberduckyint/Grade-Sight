[project]
name = "grade-sight-api"
version = "0.0.0"
description = "Grade-Sight API — diagnostic grading platform backend"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.5.0",
    "sqlalchemy[asyncio]>=2.0.36",
    "alembic>=1.14.0",
    "asyncpg>=0.30.0",
    "clerk-backend-api>=2.0.0",
    "stripe>=11.0.0",
    "anthropic>=0.39.0",
    "aioboto3>=13.0.0",
    "sentry-sdk[fastapi]>=2.18.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
    "ruff>=0.7.0",
    "mypy>=1.11.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/grade_sight_api"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]
# Alembic's autogenerated migrations use older syntax (typing.Union, etc.)
# that we don't control. Skip them rather than hand-editing every generated file.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "UP",
    "SIM",
    "RUF",
]

[tool.ruff.lint.per-file-ignores]
# FastAPI's Depends() pattern in default args is the canonical style; B008 flags it.
"src/grade_sight_api/main.py" = ["B008"]
"src/grade_sight_api/auth/dependencies.py" = ["B008"]
"src/grade_sight_api/routers/answer_keys.py" = ["B008"]
"src/grade_sight_api/routers/assessments.py" = ["B008"]
"src/grade_sight_api/routers/billing.py" = ["B008"]
"src/grade_sight_api/routers/me.py" = ["B008"]
"src/grade_sight_api/routers/students.py" = ["B008"]
"src/grade_sight_api/routers/webhooks/stripe.py" = ["B008"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: integration test that hits real external services (requires INTEGRATION=1)",
]
