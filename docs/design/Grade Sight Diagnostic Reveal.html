<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Grade Sight — Diagnostic reveal</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
</style>
</head>
<body>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#f5f3ee"/>
    <g transform="translate(60,60)">
      <circle cx="40" cy="40" r="34" fill="none" stroke="#2a2622" stroke-width="3"/>
      <circle cx="40" cy="40" r="14" fill="#2a2622"/>
    </g>
    <text x="100" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#2a2622">Grade Sight</text>
  </svg>
</template>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared-styles.jsx"></script>
<script type="text/babel" src="assessment-mock.jsx"></script>
<script type="text/babel" src="reveal-parent.jsx"></script>
<script type="text/babel" src="reveal-teacher.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="reveal" title="Diagnostic reveal — two voices, one diagnosis" subtitle="The product's defining moment. Same student, same quiz, same underlying pattern — told differently to each audience. Click an artboard's expand icon to view full-bleed.">
        <DCArtboard id="parent" label="Parent view — airy, serif, first-person, staged reveal" width={1200} height={1150}>
          <DiagnosticRevealParent />
        </DCArtboard>
        <DCArtboard id="teacher" label="Teacher view — dense, citable, override-anywhere" width={1200} height={1350}>
          <DiagnosticRevealTeacher />
        </DCArtboard>
      </DCSection>

      <DCSection id="notes" title="Design notes">
        <DCPostIt x={40} y={20} width={320}>
          <strong>Parent view</strong> stages its entrance on load — headline → evidence → pattern → intervention. Pacing does the emotional work the brief asks for. The product speaks in first person: <em>"What I saw..."</em>
        </DCPostIt>
        <DCPostIt x={380} y={20} width={320}>
          <strong>Teacher view</strong> is a working surface. Sidebar of students with their diagnostic tags, a problem-by-problem table with confidence pips and override links on every row, longitudinal context, and class rollup. Zero pacing — just density.
        </DCPostIt>
        <DCPostIt x={720} y={20} width={320}>
          <strong>Uncertainty is first-class.</strong> Every diagnosis carries a confidence pip (1–4). Low-confidence rows render their note in italic and use softer language ("possible — watch for it"). Overrides are always one click away.
        </DCPostIt>
        <DCPostIt x={40} y={240} width={320}>
          <strong>Same diagnostic data, two renderings.</strong> Both views trace back to one JSON-ish diagnosis record. The difference is voice, density, and information hierarchy — not a fork of the product.
        </DCPostIt>
        <DCPostIt x={380} y={240} width={320}>
          <strong>No charts-for-charts.</strong> Longitudinal context is a timeline of occurrences with plain-English notes, not a line chart. Class rollup is a 24-dot grid, not a bar chart. Pattern legibility over data aesthetic.
        </DCPostIt>
        <DCPostIt x={720} y={240} width={320}>
          <strong>Next:</strong> longitudinal tracking (full view, not just the side panel), the printable intervention card, and the privacy / data-controls page.
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
